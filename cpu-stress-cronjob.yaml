apiVersion: batch/v1
kind: CronJob
metadata:
  name: cpu-stress-test
  namespace: stress-test
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 240
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: cpu-stress
              image: polinux/stress
              imagePullPolicy: IfNotPresent
              command:
                - stress
              args:
                - "--cpu"
                - "4"
                - "--timeout"
                - "180s"
              resources:
                requests:
                  cpu: "500m"
                  memory: "128Mi"
                limits:
                  cpu: "4"
                  memory: "256Mi"
