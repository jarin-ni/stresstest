apiVersion: batch/v1
kind: CronJob
metadata:
  name: cpu-stress-test
  namespace: stress-test

spec:
  schedule: "*/5 * * * *"

  concurrencyPolicy: Forbid

  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2

  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 240

      template:
        metadata:
          labels:
            app: cpu-stress-test

        spec:
          restartPolicy: Never

          containers:
            - name: cpu-stress

              image: polinux/stress
              imagePullPolicy: IfNotPresent

              command:
                - /bin/sh
                - -c

              args:
                - |
                  stress \
                  --cpu 48 \
                  --vm 6 \
                  --vm-bytes 100G \
                  --timeout 180s

              resources:
                requests:
                  cpu: "4"
                  memory: "4Gi"

                limits:
                  cpu: "48"
                  memory: "650Gi"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-runner
  namespace: stress-test

spec:
  replicas: 5

  selector:
    matchLabels:
      app: stress-runner

  template:
    metadata:
      labels:
        app: stress-runner

    spec:
      restartPolicy: Always

      containers:
        - name: stress

          image: polinux/stress
          imagePullPolicy: IfNotPresent

          command:
            - /bin/sh
            - -c

          args:
            - |
              while true; do
                stress \
                --cpu 48 \
                --vm 6 \
                --vm-bytes 100G \
                --timeout 180s

                sleep 120
              done

          resources:
            requests:
              cpu: "4"
              memory: "4Gi"

            limits:
              cpu: "48"
              memory: "650Gi"
